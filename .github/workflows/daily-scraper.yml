name: Daily Automated Job Scraper

on:
  schedule:
    # ⏰ This runs every day at 16:00 UTC (which maps directly to 00:00 / Midnight Malaysia Time!)
    - cron: '0 16 * * *'
  workflow_dispatch: # Allows you to manually trigger the scraper via the GitHub website anytime for testing

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out your code repository onto the GitHub runner
    - name: Checkout Code Base
      uses: actions/checkout@v4

    # 2. Set up a stable Python environment setup
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-workspace-version: '3.12'
        cache: 'pip' # Speeds up subsequent runs by caching packages

    # 3. Install your scraper dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Run the scraper execution script with access to your system secrets vault
    - name: Execute Daily Scraper Loop
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        REPO_TARGET: ${{ secrets.REPO_TARGET }}
        PROXY_CONFIG: ${{ secrets.PROXY_CONFIG }}
      run: python run_scraper.py