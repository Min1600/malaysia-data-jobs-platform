name: Job Web Scraper

# 1. Choose WHEN this automation runs
on:
  push:
    branches: [main]

  schedule:
    - cron: '0 0 * * *' # 🌟 Keeps your automatic nightly run untouched!
    
  workflow_dispatch:   # 🌟 Adds manual controls for your Streamlit UI
    inputs:
      job_type:
        description: 'Job Title to search'
        required: true
        default: 'Data Analyst'
      location:
        description: 'Location'
        required: true
        default: 'Kuala Lumpur'
      date_range:
        description: 'Date Range (daily, weekly, monthly, all)'
        required: true
        default: 'all'

# 2. Define WHAT the virtual server actually does
jobs:
  run-script:
    runs-on: ubuntu-latest # Spins up a fresh, temporary Linux virtual machine
    
    steps:
      # Step 1: Download your repository's files onto the virtual machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Python on the virtual machine
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      # Step 3: Install libarries/dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run your actual python file!
      - name: Execute Python Script
        if: github.event_name != 'push'
        env:
          PYTHONPATH: .
          # define if run is manual or scheduled
          RUN_TYPE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'daily' }}
          # If triggered by cron, fall back to defaults, else use UI inputs
          JOB_TYPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.job_type || 'Data Analyst' }}
          LOCATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.location || 'Kuala Lumpur' }}
          DATE_RANGE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.date_range || 'daily' }}
        run: |
          python run.py
      
# Step 5: Securely upload Code, Data, and Logs directly to Hugging Face
      - name: Sync Everything to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          import logging
          from huggingface_hub import HfApi
          
          logging.getLogger('huggingface_hub').setLevel(logging.ERROR)
          api = HfApi(token=os.environ.get('HF_TOKEN'))
          REPO_ID = 'Amin1600/Web_Scraper_Server'
          
          # 1. Sync core workspace structure (skipping Git/GitHub system files)
          print('🚀 Syncing repository scripts and core workspace...')
          try:
              api.upload_folder(
                  folder_path='.',
                  repo_id=REPO_ID,
                  repo_type='space',
                  path_in_repo='.',
                  ignore_patterns=['.git/*', '.github/*', 'data/*', 'logs/*']
              )
          except Exception as e:
              print(f'Workspace sync notice: {e}')
          
          # 2. Bypass .gitignore and explicitly stream the scraped data folder
          if os.path.exists('data'):
              print('📦 Uploading fresh scraped data files (.jsonl)...')
              try:
                  api.upload_folder(
                      folder_path='data',
                      repo_id=REPO_ID,
                      repo_type='space',
                      path_in_repo='data'
                  )
              except Exception as e:
                  print(f'Data sync notice: {e}')
                  
          # 3. Bypass .gitignore and explicitly stream the operational logs folder
          if os.path.exists('logs'):
              print('📝 Uploading latest operational logs (.log)...')
              try:
                  api.upload_folder(
                      folder_path='logs',
                      repo_id=REPO_ID,
                      repo_type='space',
                      path_in_repo='logs'
                  )
              except Exception as e:
                  print(f'Logs sync notice: {e}')
                  
          print('🎉 Synchronization process finished!')
          "