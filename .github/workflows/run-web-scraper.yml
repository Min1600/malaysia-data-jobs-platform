name: Job Web Scraper

# 1. Choose WHEN this automation runs
on:
  schedule:
    - cron: '0 0 * * *' # 🌟 Keeps your automatic nightly run untouched!
    
  workflow_dispatch:   # 🌟 Adds manual controls for your Streamlit UI
    inputs:
      job_type:
        description: 'Job Title to search'
        required: true
        default: 'Data Analyst'
      location:
        description: 'Location'
        required: true
        default: 'Kuala Lumpur'
      date_range:
        description: 'Date Range (daily, weekly, monthly, all)'
        required: true
        default: 'all'

# 2. Define WHAT the virtual server actually does
jobs:
  run-script:
    runs-on: ubuntu-latest # Spins up a fresh, temporary Linux virtual machine
    
    steps:
      # Step 1: Download your repository's files onto the virtual machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Python on the virtual machine
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      # Step 3: Install libarries/dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run your actual python file!
      - name: Execute Python Script
        env:
          PYTHONPATH: .
          # define if run is manual or scheduled
          RUN_TYPE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'daily' }}
          # If triggered by cron, fall back to defaults, else use UI inputs
          JOB_TYPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.job_type || 'Data Analyst' }}
          LOCATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.location || 'Kuala Lumpur' }}
          DATE_RANGE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.date_range || 'daily' }}
        run: |
          python run.py
      
      # Step 5: Upload data using the official Python SDK 
      - name: Upload Data to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          
          # Initialize the official API manager using your Write token
          api = HfApi(token=os.environ.get('HF_TOKEN'))
          
          # 1. Safely upload the data folder if your scraper generated files
          if os.path.exists('data'):
              print('Uploading fresh scraped data files...')
              api.upload_folder(
                  folder_path='data',
                  repo_id='Amin1600/Web_Scraper_Server',
                  repo_type='space',
                  path_in_repo='data'
              )
              
          # 2. Safely upload the logs folder so you can see tracking history
          if os.path.exists('logs'):
              print('Uploading operational logs...')
              api.upload_folder(
                  folder_path='logs',
                  repo_id='Amin1600/Web_Scraper_Server',
                  repo_type='space',
                  path_in_repo='logs'
              )
              
          print('🎉 Sync completely successful!')
          "