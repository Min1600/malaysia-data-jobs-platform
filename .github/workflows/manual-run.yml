name: Test Python Script

# 1. Choose WHEN this automation runs
on:
  workflow_dispatch: # 🌟 This adds a manual "Run workflow" button in GitHub so you can trigger it whenever you want!

# 2. Define WHAT the virtual server actually does
jobs:
  run-script:
    runs-on: ubuntu-latest # Spins up a fresh, temporary Linux virtual machine
    
    steps:
      # Step 1: Download your repository's files onto the virtual machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Python on the virtual machine
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      # Step 3: Install libarries/dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run your actual python file!
      - name: Run Scraper
        run: |
          python run.py
      
      # Step 5: Push the newly created .jsonl data files straight to Hugging Face
      - name: Push Data to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.name "Scraper Automation Bot"
          git config --global user.email "bot@scraper.automation"
          
          # 🌟 This tells git to recursively look into your new data folders and capture all generated jsonl files
          git add data/**/*.jsonl logs/*.log || true
          
          if git diff-index --quiet HEAD --; then
            echo "No new data changes detected. Skipping push."
          else
            git commit -m "Automated data sync [skip ci]"
            git push https://root:$HF_TOKEN@huggingface.co/spaces/YOUR_HF_USERNAME/YOUR_SPACE_NAME main --force
          fi