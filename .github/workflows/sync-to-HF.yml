name: Deploy Code to Hugging Face Space

# 1. Choose WHEN this automation runs
on:
  push:
    branches: [main] # Triggered instantly whenever you push code changes from VS Code

# 2. Define WHAT the virtual server actually does
jobs:
  deploy-to-space:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download your repository's files onto the virtual machine
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures proper file tracking during transfer

      # Step 2: Install Python on the virtual machine (needed for the sync script)
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      # Step 3: Install minimal dependencies needed ONLY for uploading
      - name: Install Hugging Face Hub
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      # Step 4: Securely stream your core scripts to your Hugging Face Space
      - name: Sync Code to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          import logging
          from huggingface_hub import HfApi
          
          logging.getLogger('huggingface_hub').setLevel(logging.ERROR)
          api = HfApi(token=os.environ.get('HF_TOKEN'))
          
          print('🚀 Deploying code changes to Hugging Face Space...')
          try:
              api.upload_folder(
                  folder_path='.',
                  repo_id='Amin1600/Web_Scraper_Server',
                  repo_type='space',
                  path_in_repo='.',
                  ignore_patterns=['.git/*', '.github/*', 'data/*', 'logs/*']
              )
              print('🎉 Code successfully deployed! Hugging Face Space is restarting with updates.')
          except Exception as e:
              print(f'Deployment notice: {e}')
          "