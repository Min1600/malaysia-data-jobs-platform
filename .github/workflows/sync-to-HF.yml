name: Deploy Code to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  deploy-to-space:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone the repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Step 2: Push code directly to HF Space using the official tool
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://Amin1600:$HF_TOKEN@huggingface.co/spaces/Amin1600/Web_Scraper_Server main